name: paw_client
description: Paw — AI-Native Messenger
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.6.2
  
  # Dependency injection
  get_it: ^8.0.3
  
  # Local storage (encrypted)
  drift: ^2.22.1
  sqflite_sqlcipher: ^2.2.1+1
  path_provider: ^2.1.5
  path: ^1.9.0
  
  # Network
  web_socket_channel: ^3.0.1
  http: ^1.2.2
  
  # Crypto (for Ed25519 device keys)
  cryptography: ^2.7.0
  
  # UI
  flutter_markdown: ^0.7.4
  
  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  
  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  json_serializable: ^6.8.0
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
