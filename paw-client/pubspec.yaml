name: paw_client
description: Paw — AI-Native Messenger
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.11.1
  
  # State management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  
  # Navigation
  go_router: ^17.1.0
  
  # Dependency injection
  get_it: ^9.2.1
  
  # Local storage (encrypted)
  drift: ^2.22.1
  sqflite_sqlcipher: ^3.4.0
  path_provider: ^2.1.5
  path: ^1.9.0
  
  # Network
  web_socket_channel: ^3.0.1
  http: ^1.2.2
  
  # Crypto (for Ed25519 device keys)
  cryptography: ^2.7.0
  
  # UI
  flutter_markdown: ^0.7.4
  
  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^10.0.0
  
  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_rust_bridge: 2.11.1
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  riverpod_generator: ^4.0.3
  json_serializable: ^6.13.0
  drift_dev: ^2.31.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
