name: core

concurrency:
  group: core-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
    paths:
      - "paw-core/**"
      - "paw-proto/**"
      - "paw-crypto/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "paw-core/**"
      - "paw-proto/**"
      - "paw-crypto/**"
      - "Cargo.toml"
      - "Cargo.lock"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -p paw-core -p paw-proto -p paw-crypto --all-targets -- -D warnings

      - name: Test
        run: cargo test -p paw-core -p paw-proto -p paw-crypto --no-fail-fast
