name: ios

on:
  push:
    branches: [main, develop]
    paths:
      - "paw-ios/**"
      - "paw-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/build-core-ios.sh"
      - "scripts/gen-ffi-bindings.sh"
  pull_request:
    branches: [main]
    paths:
      - "paw-ios/**"
      - "paw-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/build-core-ios.sh"
      - "scripts/gen-ffi-bindings.sh"

jobs:
  ios-shell:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Generate bindings
        run: ./scripts/gen-ffi-bindings.sh

      - name: Build paw-core iOS artifacts
        run: ./scripts/build-core-ios.sh

      - name: Build Paw shell
        run: |
          cd paw-ios
          DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer \
          xcodebuild -project Paw.xcodeproj -scheme Paw -destination 'generic/platform=iOS Simulator' build
