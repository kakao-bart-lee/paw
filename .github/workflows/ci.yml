name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: paw
          POSTGRES_PASSWORD: paw_dev_password
          POSTGRES_DB: paw_dev
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      
      - name: Check format
        run: cargo fmt --all -- --check
      
      - name: Clippy (paw-core + paw-server + paw-proto + paw-crypto + paw-ffi)
        run: cargo clippy -p paw-core -p paw-server -p paw-proto -p paw-crypto -p paw-ffi -- -D warnings
      
      - name: Build (paw-core + paw-server + paw-proto + paw-crypto + paw-ffi)
        run: cargo build -p paw-core -p paw-server -p paw-proto -p paw-crypto -p paw-ffi --release
      
      - name: Test (paw-core + paw-server + paw-proto + paw-crypto + paw-ffi)
        run: cargo test -p paw-core -p paw-server -p paw-proto -p paw-crypto -p paw-ffi --no-fail-fast
        env:
          DATABASE_URL: postgresql://paw:paw_dev_password@localhost:5432/paw_dev

  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
      
      - name: Get dependencies
        run: cd paw-client && flutter pub get
      
      - name: Analyze
        run: cd paw-client && flutter analyze
      
      - name: Test
        run: cd paw-client && flutter test
      
      - name: Build web
        run: cd paw-client && flutter build web --release
