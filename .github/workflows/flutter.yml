name: flutter

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
    paths:
      - "paw-client/**"
      - "Makefile"
      - "scripts/run-playwright-smoke.sh"
      - "scripts/run-real-web-e2e.sh"
  pull_request:
    branches: [main]
    paths:
      - "paw-client/**"
      - "Makefile"
      - "scripts/run-playwright-smoke.sh"
      - "scripts/run-real-web-e2e.sh"

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - name: Get dependencies
        run: cd paw-client && flutter pub get

      - name: Analyze
        run: |
          cd paw-client
          flutter analyze --no-fatal-infos \
            lib/main.dart \
            lib/core/theme \
            lib/core/shell \
            lib/core/platform \
            lib/core/widgets/markdown_message.dart \
            lib/core/widgets/messenger_avatar.dart \
            lib/features/auth/screens/login_screen.dart \
            lib/features/auth/screens/phone_input_screen.dart \
            lib/features/auth/screens/otp_verify_screen.dart \
            lib/features/auth/screens/device_name_screen.dart \
            lib/features/auth/screens/username_setup_screen.dart \
            lib/features/auth/widgets/phone_input_field.dart \
            lib/features/auth/widgets/otp_input_field.dart \
            lib/features/settings/screens/settings_screen.dart \
            lib/features/agent/screens/agent_screen.dart \
            lib/features/profile/screens/my_profile_screen.dart \
            lib/features/profile/screens/user_profile_screen.dart \
            lib/features/chat/screens/conversations_screen.dart \
            lib/features/chat/screens/chat_screen.dart \
            lib/features/chat/screens/group_info_screen.dart \
            lib/features/chat/screens/key_verification_screen.dart \
            lib/features/chat/screens/search_screen.dart \
            lib/features/chat/widgets/conversation_tile.dart \
            lib/features/chat/widgets/message_bubble.dart \
            lib/features/chat/widgets/message_input.dart \
            lib/features/chat/widgets/stream_bubble.dart \
            lib/features/chat/widgets/agent_consent_banner.dart \
            lib/features/chat/widgets/e2ee_banner.dart \
            lib/features/chat/widgets/media_message.dart \
            lib/features/chat/widgets/media_picker.dart \
            lib/features/chat/widgets/read_receipt_indicator.dart \
            lib/features/chat/widgets/tool_indicator.dart \
            lib/features/chat/widgets/typing_indicator.dart

      - name: Test
        run: |
          cd paw-client
          flutter test \
            test/widget_test.dart \
            test/features/chat/widgets/media_picker_test.dart \
            test/features/settings/screens/settings_screen_test.dart \
            test/desktop_service_test.dart

      - name: Build web
        run: cd paw-client && flutter build web --release
