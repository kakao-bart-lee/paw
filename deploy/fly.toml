# fly.toml app configuration file generated for paw-server on 2026-03-07

app = "paw-server"
primary_region = "nrt"

[build]
  dockerfile = "../Dockerfile"

[http_service]
  internal_port = 38173
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  RUST_LOG = "info"
  PORT = "38173"

[mounts]
  source = "paw_data"
  destination = "/data"
