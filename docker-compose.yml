services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paw
      POSTGRES_PASSWORD: paw_dev_password
      POSTGRES_DB: paw_dev
    ports:
      - "35432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paw -d paw_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: paw_minio
      MINIO_ROOT_PASSWORD: paw_minio_password
    ports:
      - "39080:9000"
      - "39081:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "34223:4222"
      - "38223:8222"  # monitoring
    command: ["--jetstream"]

volumes:
  postgres_data:
  minio_data:
